# Example automations for INA219 UPS Hat.
# Entity IDs follow the pattern: <domain>.<device_name>_<suffix>
# where <device_name> is the name you gave the integration (lowercased, spaces→underscores).
# Example: device name "INA219 UPS" → binary_sensor.ina219_ups_online, sensor.ina219_ups_battery
# Replace "ina219_ups" below with your actual device name slug.

- id: ina219_ups_hat_on_power_loss
  alias: '[UPS] On Power Loss/Restored'
  description: Send notification on power loss
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.ina219_ups_online
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 5
  - platform: state
    entity_id:
    - binary_sensor.ina219_ups_online
    from: 'off'
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 5
  action:
  - if:
    - condition: state
      entity_id: binary_sensor.ina219_ups_online
      state: 'off'
    then:
    - service: notify.notify
      data:
        message: Power outage detected
        title: "\U0001F50C *UPS*"
    else:
    - service: notify.notify
      data:
        message: Power restored
        title: "\U0001F50C *UPS*"
  mode: single

- id: ina219_ups_hat_on_charge_critical
  alias: '[UPS] On Charge Critical'
  description: Send notification & gracefully shutdown host
  trigger:
  - platform: numeric_state
    entity_id: sensor.ina219_ups_battery
    for:
      hours: 0
      minutes: 0
      seconds: 20
    below: 10
  action:
  - service: notify.notify
    data:
      message: Battery critical. Shutting down.
      title: "\U0001FAAB *UPS*"
  - event: set_shutdown_reason
    event_data:
      reason: ups_charge_critical
  - service: hassio.host_shutdown
    data: {}
    enabled: true
  mode: single
