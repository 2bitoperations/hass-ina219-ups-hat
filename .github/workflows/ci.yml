name: CI

on:
  push:
    branches: ["master"]
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - name: HACS validation
        uses: "hacs/action@22.5.0"
        with:
          category: "integration"

  validate-hassfest:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
      - uses: "home-assistant/actions/hassfest@master"

  release:
    runs-on: ubuntu-latest
    needs: [validate-hacs, validate-hassfest]
    if: "github.event_name == 'push' && github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[skip release]')"
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump patch version in manifest.json
        id: bump
        run: |
          VERSION=$(jq -r .version custom_components/ina219_ups_hat/manifest.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          jq --arg v "$NEW_VERSION" '.version = $v' \
            custom_components/ina219_ups_hat/manifest.json > /tmp/m.json
          mv /tmp/m.json custom_components/ina219_ups_hat/manifest.json
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/ina219_ups_hat/manifest.json
          git commit -m "chore: bump to v${{ steps.bump.outputs.version }} [skip release]"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin master
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          generate_release_notes: true
